<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; }
    input { width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 8px; }
    button { width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
    #startBtn { background-color: #4CAF50; color: white; }
    #startBtn:disabled { background-color: #cccccc; cursor: not-allowed; }
    #stopBtn { background-color: #f44336; color: white; }
    #stopBtn:disabled { background-color: #cccccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <h3>Auto Refresher</h3>
  <input type="text" id="urlInput" placeholder="감지할 URL을 입력하세요">
  <button id="startBtn">시작</button>
  <button id="stopBtn">중지</button>
  <script src="popup.js"></script>
</body>
</html>
